name: Weekly Content Generation

on:
  schedule:
    # Every Monday at 6:00 AM UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      site:
        description: "Site to process (accountants, real-estate, healthcare, or leave empty for all)"
        required: false
        default: ""

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "src/package.json"

      - name: Install dependencies
        run: |
          cd src
          npm install

      - name: Run content generation — all sites
        if: ${{ github.event.inputs.site == '' || github.event_name == 'schedule' }}
        run: |
          cd src
          npx ts-node generate-content.ts --all

      - name: Run content generation — specific site
        if: ${{ github.event.inputs.site != '' && github.event_name != 'schedule' }}
        run: |
          cd src
          npx ts-node generate-content.ts --site=${{ github.event.inputs.site }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Configure git
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "AI Tools Compass Bot"
          git config user.email "bot@aitools-compass.com"

      - name: Commit new content
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add \
            ai-for-accountants/data/comparisons.ts \
            ai-for-real-estate/data/comparisons.ts \
            ai-for-healthcare/data/comparisons.ts
          git commit -m "chore: weekly content generation $(date +%Y-%m-%d)

          Auto-generated by weekly-content.yml
          - Added new comparison pages
          - Refreshed stale lastUpdated dates"

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: git push origin main

      - name: Summary — no changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No new content to commit — all comparison specs already exist."
