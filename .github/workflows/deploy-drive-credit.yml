name: Deploy drive-credit (production Worker)

# Production is the Cloudflare Worker `drive-credit-worker` (wrangler.workers.toml),
# NOT the `drive-credit` Pages project — this mirrors ventures/drive-credit/deploy.sh,
# the only deploy path that reaches mintbrooks.com. The old Pages-targeting workflow
# failed on every push since at least June 8 (lockfile drift + wrong target + a dead
# IndexNow key); index submission now lives in the lean-core org's hourly cycles.

on:
  push:
    branches: [main]
    paths:
      - 'ventures/drive-credit/**'
      - '.github/workflows/deploy-drive-credit.yml'

concurrency:
  group: deploy-drive-credit
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ventures/drive-credit/package-lock.json

      - name: Install dependencies
        working-directory: ventures/drive-credit
        run: npm ci || npm install

      - name: Build + deploy production Worker
        working-directory: ventures/drive-credit
        run: bash deploy.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cefaf46df9642a046481c8c6d7879cb9
