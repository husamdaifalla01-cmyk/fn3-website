name: Deploy drive-credit to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'ventures/drive-credit/**'
      - '.github/workflows/deploy-drive-credit.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ventures/drive-credit/package-lock.json

      - name: Install dependencies
        working-directory: ventures/drive-credit
        run: npm ci

      - name: Build with OpenNext
        working-directory: ventures/drive-credit
        run: npx @opennextjs/cloudflare build

      - name: Prepare deployment bundle
        working-directory: ventures/drive-credit
        run: |
          # Copy all worker dependencies into assets/ so wrangler can bundle them
          cp .open-next/worker.js .open-next/assets/_worker.js
          find .open-next -maxdepth 1 -mindepth 1 \
            ! -name assets ! -name worker.js \
            -exec cp -r {} .open-next/assets/ \;
          # Copy public/ files (images, fonts, etc.) into assets root
          cp -r public/. .open-next/assets/
          # Tell Cloudflare Pages to serve static files directly (bypass Worker)
          echo '{"version":1,"include":["/*"],"exclude":["/_next/static/*","/_next/image*","/favicon.ico","/robots.txt","/*.txt","/*.jpg","/*.jpeg","/*.png","/*.gif","/*.webp","/*.svg","/*.ico","/*.mp4","/*.mp3","/*.woff","/*.woff2","/*.ttf","/articles/editorial/*","/articles/affiliate/*","/lifestyle/*"]}' > .open-next/assets/_routes.json

      - name: Deploy to Cloudflare Pages
        working-directory: ventures/drive-credit
        run: npx wrangler pages deploy .open-next/assets --project-name=drive-credit --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cefaf46df9642a046481c8c6d7879cb9

      - name: Ping IndexNow (Bing)
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "mintbrooks.com",
              "key": "338e4f9275e14f2880a23aae2ef100dc",
              "keyLocation": "https://mintbrooks.com/338e4f9275e14f2880a23aae2ef100dc.txt",
              "urlList": [
                "https://mintbrooks.com/",
                "https://mintbrooks.com/articles",
                "https://mintbrooks.com/beauty",
                "https://mintbrooks.com/wellness",
                "https://mintbrooks.com/home-decor",
                "https://mintbrooks.com/kitchen",
                "https://mintbrooks.com/finance",
                "https://mintbrooks.com/sitemap.xml"
              ]
            }' || true
